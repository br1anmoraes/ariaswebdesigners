<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Arias - Web Designers</title>
    <script src="scripts/script.js"></script>
</head>


<body>


    <div class="login-box">

        <form>
            <center>
                <img src="img/logo.png" alt="logo" width="150em">
                <h1>arias</h1>
                <h2>Web Designers</h2>
            </center>
            <div class="user-box">
                <input type="text" name="" id="username" required>
                <label>Nombre de usuario</label>
            </div>
            <div class="user-box">
                <input type="password" name="Contraseña" id="password" required>
                <label>Contraseña</label>
            </div>
            <center>
                <input type="submit" value="Iniciar sesión" id="button" onclick="login()">
                <p id="message" class="wrong-password"></p>
            </center>
        </form>
    </div>

</body>


</html>
